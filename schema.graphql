# ============================================
# CUSTOM SCALARS
# ============================================

"""
DateTime scalar type
Formato: ISO 8601 (YYYY-MM-DDTHH:mm:ssZ)
Exemplo: 2026-04-16T14:30:00Z
"""
scalar DateTime

"""
Enuns
"""

enum Roles {
    USER 
    ADMIN 
    SUPER_ADMIN 
}

enum ExpirationApiKey {
    ONE_HOUR 
    ONE_DAY 
    TWO_DAYS 
    SEVEN_DAYS 
    THIRTY_DAYS
    NINETY_DAYS
    ONE_YEAR
}

"""
Types
"""
type ApiErrorType {
    errorName: String!
    typeError: String!
    statusCode: Int
}

type UserPublicType {
    name: String
    email: String!
    createdAt: DateTime
    updatedAt: DateTime
}

type UserPrivateType {
    userId: String!
    name: String
    email: String!
    password: String
    role: Roles
    isDeleted: Boolean
    createdAt: DateTime
    updatedAt: DateTime
}

type SessionType {
    sessionId: String!
    createdAt: DateTime!
    expiresAt: DateTime!
}

type TwoFactorAuthType {
    token: String!
    number: Int!
    expiresAt: DateTime
}

type ApiKeyType {
    token: String
    expiresAt: DateTime
}

type ApiResponseType {
    success: Boolean!
    data: Data
    error: ApiErrorType
    timestamp: Float!
}

type UserListType {
    items: [UserPrivateType]
    total: Int
    page: Int
    limit: Int
    hasNextPage: Boolean
}


"""
Inputs
"""
input UserInput {
    name: String
    email: String
    password: String
}

input UserPrivateInput {
    name: String
    email: String
    password: String
    role: Roles
}

input UserUpdatePublicInput {
    name: String
}

input UserUpdatePrivateInput {
    userId: String!
    name: String
    email: String
    role: Roles 
    password: String
}

input UserLoginInput {
    email: String!
    password: String!
}

input PaginationInput {
    page: Int
    limit: Int
    all_: Boolean
}

input Verify2FAInput {
    number: Int!
    token: String!
}

input ForgotPasswordInput {
    email: String!
}

input UserResetPasswordInput {
    password: String!
    token: String!
}

input ApiKeyInput {
    expiration: ExpirationApiKey
}

union Data = UserPublicType | UserPrivateType | ApiKeyType | SessionType | TwoFactorAuthType | UserListType | Boolean

type Mutation {
    create(schema: UserInput): ApiErrorType!
    login(schema: UserLoginInput!): ApiResponseType!
    update(schema: UserUpdatePublicInput): ApiResponseType!
    verifyTwoFactor (schema: Verify2FAInput): ApiResponseType!
    delete: ApiResponseType!
    forgotPassword(schema: ForgotPasswordInput): ApiResponseType!
    resetPassword(schema: UserResetPasswordInput): ApiResponseType!
    createApiKey(schema: ApiKeyInput!): ApiResponseType!
    createUserByAdmin(schema: UserPrivateInput!): ApiResponseType!
    updateUserByAdmin(schema: UserUpdatePrivateInput!): ApiResponseType!
    deleteUserByAdmin(userId: String!): ApiResponseType!
    deleteApiKey(key: String!): ApiResponseType!
}

type Query {
    listUsers(schema: PaginationInput!): ApiResponseType!
    getByIdUser(userId: String!): ApiResponseType!
    getUser: ApiResponseType!
}


