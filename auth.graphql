mutation LoginUserSchema($schema: UserLoginInput!) {
    login(schema: $schema) {
        success
        error {
            errorName
            typeError
            statusCode
        }
        data {
            ... on TwoFactorAuthType {
                token
                number
                expiresAt
            }
        }
    }
}

mutation Verify2FASchema($schema: Verify2FAInput!) {
    verifyTwoFactor(schema: $schema) {
        success
        data {
            ... on SessionType {
                sessionId
                createdAt
                expiresAt
            }
        }
        error {
            errorName
            typeError
            statusCode
        }
    }
}

mutation CreateUserSchema ($schema: UserInput!) {
    create (schema: $schema){
        success
        data {  name email createdAt updatedAt}
        error { errorName typeError statusCode }
    }
}

mutation CreateUserByAdminSchema ($schema: UserPrivateInput!) {
    createUserByAdmin (schema: $schema){
        success
        data {  name email }
        error { errorName typeError statusCode }
    }
}

mutation DeleteAdminSchema($userId: String!){
    deleteUserByAdmin(userId: $userId) {
        success
        data 
        error { errorName typeError statusCode }
    }
}

mutation UpdateUserByAdminSchema($schema: UserUpdatePrivateInput!){
    updateUserByAdmin (schema: $schema){
        success
        data {  name email role password createdAt updatedAt }
        error { errorName typeError statusCode }
    }
}

mutation DeleteApiKeySchema($key: String!){
    deleteApiKey(key: $key) {
        success
        data 
        error { errorName typeError statusCode }
    }
}

mutation UpdateUser($schema: UserUpdatePublicInput!){
    update (schema: $schema){
        success
        data {  name email createdAt updatedAt }
        error { errorName typeError statusCode }
    }
}

mutation ForgotPasswordSchema($schema: ForgotPasswordInput!) {
    forgotPassword(schema: $schema) {
        success
        data {
            token
            expiresAt
        }
        error { errorName typeError statusCode }
    }
}

mutation ResetPasswordSchema($schema: UserResetPasswordInput!) {
    resetPassword(schema: $schema) {
        success
        data {
            name
            email
        }
        error { errorName typeError statusCode }
    }
}

mutation {
    delete {
        success
        data 
        error { errorName typeError statusCode }
    }
}

query ListUsersSchema($page: Int, $limit: Int){
    listUsers (page: $page, limit: $limit){
        success
        data { 
            users {
                userId
                name 
                email
                role
                isDeleted
                password
                createdAt
                updatedAt
            }
                
        }
        error { errorName typeError statusCode }
    }
}

query GetByIdUser($userId: String!){
    getByIdUser(userId: $userId){
        success
        data { 
            name 
            email 
            isDeleted
            createdAt 
            updatedAt 
        }
        error { errorName typeError statusCode }
    }
}

